groups:
  - name: app_alerts
    rules:
      - alert: ServiceDown
        expr: up{job="flask-app"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Flask app instance {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 30 seconds."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_errors_total[2m])) by (instance)
            /
            sum(rate(http_requests_total[2m])) by (instance)
          ) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "Error rate is above 5% for the last 2 minutes on {{ $labels.instance }}."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[2m])) by (le, instance))
          > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.instance }}"
          description: "p95 latency is above 2 seconds on {{ $labels.instance }}."
